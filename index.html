<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat with OpenAI</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="brand" role="banner">
        <div class="brand-mark" aria-hidden="true">◎</div>
        <div>
          <p class="brand-title">OpenAI Chat</p>
          <p class="brand-subtitle">Talk with OpenAI chat.completions API</p>
        </div>
      </div>
      <details class="settings" aria-label="API key and model settings">
        <summary aria-label="Toggle chat settings">Settings</summary>
        <form id="settings-form" autocomplete="off">
          <label class="field">
            <span class="field-label">OpenAI API key</span>
            <input type="password" id="api-key" name="apiKey" placeholder="sk-..." required>
            <p class="helper">Key is stored locally in this browser only.</p>
          </label>
          <label class="field">
            <span class="field-label">Model</span>
            <select id="model" name="model">
              <option value="gpt-4o-mini" selected>gpt-4o-mini</option>
              <option value="gpt-4o">gpt-4o</option>
              <option value="gpt-3.5-turbo">gpt-3.5-turbo</option>
            </select>
          </label>
          <label class="field">
            <span class="field-label">Temperature</span>
            <input type="number" id="temperature" name="temperature" min="0" max="2" step="0.1" value="0.7">
          </label>
          <button type="submit" class="button primary">Save</button>
        </form>
      </details>
    </header>

    <main id="conversation" class="conversation" role="log" aria-live="polite" aria-label="Chat conversation"></main>

    <footer class="composer" aria-label="Message composer">
      <form id="composer-form">
        <label for="user-input" class="visually-hidden">Write your message</label>
        <textarea id="user-input" name="message" placeholder="Send a message" rows="1" required></textarea>
        <div class="composer-actions">
          <button type="submit" class="button primary" id="send-button" aria-label="Send message">Send</button>
        </div>
      </form>
    </footer>
  </div>

  <template id="message-template">
    <article class="message" aria-live="polite">
      <div class="avatar" aria-hidden="true"></div>
      <div class="bubble">
        <div class="message-metadata">
          <span class="role"></span>
          <span class="status" hidden></span>
        </div>
        <div class="message-content"></div>
      </div>
    </article>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/common.min.js"></script>
  <script src="script.js" defer></script>
</body>
</html>
