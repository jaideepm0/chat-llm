<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat with OpenAI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.5.1/github-markdown.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/styles/github.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
</head>
<body class="bg-body text-body" style="font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
  <div class="app d-flex flex-column min-vh-100 w-100">
    <header class="app-header border-bottom bg-body-tertiary py-3">
      <div class="container-xl d-flex flex-column flex-lg-row align-items-lg-center justify-content-between gap-3">
        <div class="d-flex align-items-center gap-3" role="banner">
          <div class="brand-mark rounded-circle bg-body-secondary d-flex align-items-center justify-content-center fw-semibold" style="width:2.5rem;height:2.5rem;">◎</div>
          <div class="brand-copy markdown-body m-0" data-copy="brand"></div>
        </div>
        <div class="d-flex align-items-center gap-2 ms-lg-auto">
          <button type="button" class="btn btn-outline-secondary btn-sm" id="theme-toggle" aria-live="polite">Switch to dark</button>
          <details class="settings" aria-label="API key and model settings">
            <summary class="btn btn-outline-secondary btn-sm" aria-label="Toggle chat settings">Settings</summary>
            <form id="settings-form" class="d-grid gap-3 mt-2 border rounded-3 p-3 bg-body" autocomplete="off">
              <div class="d-grid gap-1">
                <label class="form-label small fw-semibold" for="api-key">OpenAI API key</label>
                <input type="password" class="form-control form-control-sm" id="api-key" name="apiKey" placeholder="sk-..." autocomplete="off" required>
                <div class="markdown-body form-text" data-copy="helper"></div>
              </div>
              <div class="d-grid gap-1">
                <label class="form-label small fw-semibold" for="model">Model</label>
                <select id="model" name="model" class="form-select form-select-sm">
                  <option value="gpt-4o-mini" selected>gpt-4o-mini</option>
                  <option value="gpt-4o">gpt-4o</option>
                  <option value="gpt-3.5-turbo">gpt-3.5-turbo</option>
                </select>
              </div>
              <div class="d-grid gap-1">
                <label class="form-label small fw-semibold" for="temperature">Temperature</label>
                <input type="number" class="form-control form-control-sm" id="temperature" name="temperature" min="0" max="2" step="0.1" value="0.7">
              </div>
              <button type="submit" class="btn btn-dark btn-sm w-auto">Save</button>
            </form>
          </details>
        </div>
      </div>
    </header>

    <main id="conversation" class="flex-grow-1 overflow-auto py-4" role="log" aria-live="polite" aria-label="Chat conversation">
      <div class="container-xl d-flex flex-column gap-3 align-items-center" id="conversation-inner"></div>
    </main>

    <footer class="composer border-top bg-body py-3" aria-label="Message composer">
      <div class="container-xl">
        <form id="composer-form" class="d-grid gap-2">
          <label for="user-input" class="visually-hidden">Write your message</label>
          <textarea id="user-input" class="form-control" name="message" placeholder="Send a message" rows="1" required></textarea>
          <div class="markdown-body small text-body-secondary" data-copy="composer"></div>
          <div class="d-flex justify-content-end">
            <button type="submit" class="btn btn-dark" id="send-button" aria-label="Send message">Send</button>
          </div>
        </form>
      </div>
    </footer>
  </div>

  <template id="message-template">
    <article class="message message-row w-100" style="max-width: 960px;" aria-live="polite">
      <div class="d-flex gap-3 align-items-start">
        <div class="avatar rounded-circle d-flex align-items-center justify-content-center fw-semibold bg-secondary-subtle text-secondary-emphasis" style="width:2.5rem;height:2.5rem;" aria-hidden="true"></div>
        <div class="card border-0 shadow-sm flex-grow-1">
          <div class="card-body p-3">
            <div class="message-metadata d-flex gap-2 small text-body-secondary mb-2">
              <span class="role"></span>
              <span class="status" hidden></span>
            </div>
            <div class="message-content markdown-body mb-0"></div>
          </div>
        </div>
      </div>
    </article>
  </template>

  <script type="text/markdown" id="copy-inline">
[brand]
**OpenAI Chat**

Talk with the OpenAI chat.completions API.
[/brand]

[helper]
_Key is kept only for this browser session. Provide it again whenever you reload._
[/helper]

[composer]
_Shift + Enter inserts a new line. You can paste code snippets or Markdown for better formatting._
[/composer]

[empty]
# Talk to LLM through API by simple configuration.

Quick start:
- Set OPENAI_API_KEY in your environment or paste it in the session helper.
- Choose model, temperature, and max tokens in the configuration.
- Send a chat message and receive the completion (supports streaming).

Example curl:
```bash
curl https://api.openai.com/v1/chat/completions \
  -H "Authorization: Bearer $OPENAI_API_KEY" \
  -H "Content-Type: application/json" \
  -d '{"model":"gpt-4o-mini","messages":[{"role":"user","content":"Say hello"}]}'
```

Tips:
- Use lower temperature (0.0-0.3) for deterministic outputs.
- Use system messages for high-level instructions and behavior.

[/empty]
  </script>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="script.js" defer></script>
</body>
</html>
